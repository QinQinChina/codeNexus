appId: com.codenexus.desktop
productName: CodeNexus

publish:
  provider: github
  owner: zhenyue6612
  repo: codeNexus
  releaseType: release
  channel: latest

directories:
  buildResources: build
  output: release

asar: true

files:
  - from: .
    to: .
    filter:
      - package.json
  - from: dist
    to: dist
    filter:
      - "**/*"

extraResources:
  - from: music
    to: music
    filter:
      - "**/*"
  - from: build/icon.ico
    to: icon.ico

win:
  icon: build/icon.ico
  artifactName: "${productName}-Setup-${version}.${ext}"
  signAndEditExecutable: true
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
