appId: com.throughstate.desktop
productName: CodeNexus

directories:
  buildResources: build
  output: release

asar: true

files:
  - from: .
    to: .
    filter:
      - package.json
  - from: dist
    to: dist
    filter:
      - "**/*"

extraResources:
  - from: music
    to: music
    filter:
      - "**/*"
  - from: build/icon.ico
    to: icon.ico

win:
  icon: build/icon.ico
  signAndEditExecutable: true
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
